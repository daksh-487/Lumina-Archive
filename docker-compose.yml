version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ergosphere_db
    environment:
      MYSQL_DATABASE: document_intelligence
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ergo_user
      MYSQL_PASSWORD: ergo_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: ergosphere_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
